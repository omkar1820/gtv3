# ============================================================
# GTA V — Kubernetes Manifests (all-in-one)
# Apply: kubectl apply -f kubernetes/
# ============================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: gta5-game
  labels:
    app: gta5-game
    env: production

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: gta5-config
  namespace: gta5-game
data:
  DB_HOST:     "postgres-service"
  DB_PORT:     "5432"
  DB_NAME:     "gta5game"
  DB_USER:     "gta5user"
  REDIS_URL:   "redis://redis-service:6379"
  NODE_ENV:    "production"
  PORT:        "3000"

---
# Secret
apiVersion: v1
kind: Secret
metadata:
  name: gta5-secrets
  namespace: gta5-game
type: Opaque
stringData:
  DB_PASSWORD: "gta5pass"
  JWT_SECRET:  "gta5-super-secret-jwt-key-change-in-prod"

---
# ── POSTGRES ───────────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: gta5-game
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: gta5-game
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB,       value: "gta5game" }
            - { name: POSTGRES_USER,     value: "gta5user" }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: gta5-secrets, key: DB_PASSWORD }
          volumeMounts:
            - { name: postgres-storage, mountPath: /var/lib/postgresql/data }
          resources:
            requests: { memory: "256Mi", cpu: "250m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "gta5user", "-d", "gta5game"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gta5user", "-d", "gta5game"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: gta5-game
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
  type: ClusterIP

---
# ── REDIS ──────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: gta5-game
  labels: { app: redis }
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb"]
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "64Mi",  cpu: "50m" }
            limits:   { memory: "128Mi", cpu: "100m" }
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: gta5-game
spec:
  selector: { app: redis }
  ports:
    - { port: 6379, targetPort: 6379 }
  type: ClusterIP

---
# ── BACKEND ────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gta5-backend
  namespace: gta5-game
  labels: { app: gta5-backend }
spec:
  replicas: 3
  selector:
    matchLabels: { app: gta5-backend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: gta5-backend }
    spec:
      containers:
        - name: backend
          image: gta5-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: gta5-config }
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: gta5-secrets, key: DB_PASSWORD }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: gta5-secrets, key: JWT_SECRET }
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: gta5-game
spec:
  selector: { app: gta5-backend }
  ports:
    - { port: 3000, targetPort: 3000 }
  type: ClusterIP

---
# ── FRONTEND ───────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gta5-frontend
  namespace: gta5-game
  labels: { app: gta5-frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: gta5-frontend }
  template:
    metadata:
      labels: { app: gta5-frontend }
    spec:
      containers:
        - name: frontend
          image: gta5-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { memory: "32Mi",  cpu: "50m"  }
            limits:   { memory: "128Mi", cpu: "100m" }
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: gta5-game
spec:
  selector: { app: gta5-frontend }
  ports:
    - { port: 80, targetPort: 80 }
  type: LoadBalancer

---
# ── INGRESS ────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gta5-ingress
  namespace: gta5-game
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: gta5.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port: { number: 3000 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port: { number: 80 }

---
# ── HPA (Horizontal Pod Autoscaler) ───────────────────────────

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: gta5-game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gta5-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
