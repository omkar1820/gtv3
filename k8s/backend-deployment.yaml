# ═══════════════════════════════════════════════════════
#  Kubernetes — Backend Deployment
# ═══════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: gta5-game
  labels:
    app: gta5-game
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gta5-backend
  namespace: gta5-game
  labels:
    app: gta5-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gta5-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gta5-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/gta5-game:latest-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gta5-secrets
                  key: redis-url
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /live
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gta5-backend
  namespace: gta5-game
spec:
  selector:
    app: gta5-backend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gta5-backend-hpa
  namespace: gta5-game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gta5-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
